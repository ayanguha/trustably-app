site_name: Trustably Docs
site_description: Personal profile – data, AI, and engineering leadership
site_url: https://your-domain.com/docs/
use_directory_urls: false

theme:
  name: material
  font:
    text: Google Sans
  palette:
    scheme: default
    primary: custom
    accent: custom
  footer:
    # This adds a simple copyright notice
    copyright: "Copyright &copy; 2024 Trustably - Applied AI Adoption Framework"
  features:
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.fade
  icon:
    logo: simple/ticktick


nav:
  - Home: index.md
  - Care: care.md
  - Maturity: maturity.md
  - Fluency: fluency.md
  - Playbook: playbook.md 
  - Lifecycle: lifecycle.md 

plugins:
  - search:
      enabled: false

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.blocks.caption
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true


extra_css:
  - stylesheets/extra.css


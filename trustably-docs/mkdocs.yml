site_name: Trustably Docs
site_description: Personal profile – data, AI, and engineering leadership
site_url: https://your-domain.com/docs/
use_directory_urls: false

theme:
  name: material
  font:
    text: Google Sans
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.fade
  icon:
    logo: simple/ticktick


nav:
  - Home: index.md
  - Care: care.md
  - Maturity: maturity.md
  - Fluency: fluency.md

plugins:
  - search:
      enabled: false

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.blocks.caption
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true


extra_css:
  - stylesheets/extra.css


extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ayan-g-660b858/
    - icon: fontawesome/brands/github
      link: https://github.com/ayanguha 
    - icon: simple/medium
      link: https://medium.com/@guha-ayan
